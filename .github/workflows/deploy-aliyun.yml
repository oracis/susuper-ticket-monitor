name: Deploy to Aliyun OSS
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python and oss2 SDK
        run: |
          pip install oss2

      - name: Upload to OSS
        run: python -c "
import oss2
import os

auth = oss2.Auth('${{ secrets.OSS_ACCESS_KEY_ID }}', '${{ secrets.OSS_ACCESS_KEY_SECRET }}')
bucket = oss2.Bucket(auth, 'oss-cn-shanghai.aliyuncs.com', '${{ secrets.OSS_BUCKET }}')

for f in ['index.html']:
    if os.path.exists(f):
        bucket.put_object(f, open(f, 'rb'))
        print(f'Uploaded: {f}')
"
