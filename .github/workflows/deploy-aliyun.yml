name: Deploy to Aliyun OSS
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download and install ossutil
        run: |
          wget -q https://github.com/aliyun/ossutil/releases/download/v1.7.19/ossutil-linux-amd64 -O ossutil
          chmod +x ossutil

      - name: Configure and upload to OSS
        run: |
          ./ossutil config --endpoint oss-cn-shanghai.aliyuncs.com --access-key-id ${{ secrets.OSS_ACCESS_KEY_ID }} --access-key-secret ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          ./ossutil cp index.html oss://${{ secrets.OSS_BUCKET }}/index.html --force
