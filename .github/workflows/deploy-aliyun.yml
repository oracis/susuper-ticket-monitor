name: Deploy to Aliyun OSS
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install ossutil
        run: |
          go install github.com/aliyun/ossutil/cmd/ossutil@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Configure and upload to OSS
        run: |
          ossutil config --endpoint oss-cn-shanghai.aliyuncs.com --access-key-id ${{ secrets.OSS_ACCESS_KEY_ID }} --access-key-secret ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          ossutil cp index.html oss://${{ secrets.OSS_BUCKET }}/index.html --force
