name: Deploy to Aliyun OSS
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ossutil
        run: |
          wget -O ossutil https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil-linux-amd64
          chmod +x ossutil
          ./ossutil config --endpoint oss-cn-shanghai.aliyuncs.com --access-key-id ${{ secrets.OSS_ACCESS_KEY_ID }} --access-key-secret ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Upload to OSS
        run: ./ossutil cp index.html oss://${{ secrets.OSS_BUCKET }}/index.html --force
