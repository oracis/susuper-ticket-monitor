name: Deploy to Aliyun OSS
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python and oss2 SDK
        run: pip install oss2

      - name: Upload to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          python << 'EOF'
          import oss2
          import os
          import mimetypes

          auth = oss2.Auth(os.environ['OSS_ACCESS_KEY_ID'], os.environ['OSS_ACCESS_KEY_SECRET'])
          bucket = oss2.Bucket(auth, 'oss-cn-shanghai.aliyuncs.com', os.environ['OSS_BUCKET'])

          # MIME type mapping
          mime_types = {
              '.html': 'text/html',
              '.css': 'text/css',
              '.js': 'application/javascript',
              '.json': 'application/json',
              '.png': 'image/png',
              '.jpg': 'image/jpeg',
              '.jpeg': 'image/jpeg',
              '.gif': 'image/gif',
              '.svg': 'image/svg+xml',
              '.ico': 'image/x-icon',
              '.woff': 'font/woff',
              '.woff2': 'font/woff2',
              '.ttf': 'font/ttf',
              '.eot': 'application/vnd.ms-fontobject',
          }

          for root, dirs, files in os.walk('.'):
              for f in files:
                  filepath = os.path.join(root, f)
                  # Skip .git and node_modules
                  if '.git' in filepath or 'node_modules' in filepath:
                      continue
                  # Determine content type
                  ext = os.path.splitext(f)[1].lower()
                  content_type = mime_types.get(ext, 'application/octet-stream')
                  # Upload with headers
                  headers = {'Content-Type': content_type}
                  bucket.put_object_from_file(filepath, filepath, headers=headers)
                  print(f'Uploaded: {filepath} ({content_type})')
          EOF
